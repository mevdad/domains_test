# Redirect all HTTP traffic to HTTPS
server {
	listen 80;
	listen [::]:80;
	server_name parrot.black www.parrot.black;

	# Allow Let's Encrypt ACME http-01 challenges over plain HTTP
	location ^~ /.well-known/acme-challenge/ {
		root /var/www/public;
		allow all;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name parrot.black www.parrot.black;
	root /var/www/public;

	ssl_certificate     /etc/nginx/certs/live/parrot.black/fullchain.pem;
	ssl_certificate_key /etc/nginx/certs/live/parrot.black/privkey.pem;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;

	add_header X-Frame-Options "SAMEORIGIN";
	add_header X-XSS-Protection "1; mode=block";
	add_header X-Content-Type-Options "nosniff";
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	index index.html index.htm index.php;

	charset utf-8;

	location / {
		try_files $uri $uri/ /index.php?$query_string;
	}

	location = /favicon.ico { access_log off; log_not_found off; }
	location = /robots.txt { access_log off; log_not_found off; }

	error_page 404 /index.php;

	location ~ \.php$ {
		fastcgi_pass app:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
		fastcgi_param HTTPS on;
		fastcgi_param HTTP_X_FORWARDED_PROTO https;
		include fastcgi_params;
	}

	location ~ /\.(?!well-known).* {
		deny all;
	}
}
